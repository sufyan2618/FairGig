name: _service (reusable build → push → deploy)

on:
  workflow_call:
    inputs:
      context:
        description: "Docker build context (relative path)"
        required: true
        type: string
      image:
        description: "Docker Hub image name, e.g. auth-service"
        required: true
        type: string
      deployment:
        description: "k8s Deployment name, e.g. auth-service"
        required: true
        type: string
      container:
        description: "Container name inside the k8s Deployment"
        required: true
        type: string
      build-args:
        description: "Optional Docker build-args (KEY=VALUE, newline-separated)"
        required: false
        type: string
        default: ""
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Short SHA used as the immutable image tag so every deploy is traceable
      # and k8s always pulls the new image (avoids IfNotPresent cache on :latest)
      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image }}:latest
          build-args: ${{ inputs.build-args }}
          # Per-image cache scopes so services don't evict each other's cache
          cache-from: type=gha,scope=${{ inputs.image }}
          cache-to: type=gha,scope=${{ inputs.image }},mode=max

      - name: Update image on VPS and wait for rollout
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            kubectl set image deployment/${{ inputs.deployment }} \
              ${{ inputs.container }}=${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image }}:${{ steps.vars.outputs.tag }} \
              -n app
            kubectl rollout status deployment/${{ inputs.deployment }} \
              -n app --timeout=180s
