services:
  postgres:
    image: postgres:16-alpine
    container_name: fairgig-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: fairgig_auth,fairgig_earnings,fairgig_analytics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - fairgig-net

  redis:
    image: redis:7-alpine
    container_name: fairgig-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - fairgig-net

  mongo:
    image: mongo:7
    container_name: fairgig-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - fairgig-net

  auth-service:
    build:
      context: ./services/authService
      dockerfile: Dockerfile
    container_name: fairgig-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fairgig_auth
      REDIS_URL: redis://redis:6379/0
      APP_NAME: FairGig Auth Service
      API_PREFIX: /api
      ACCESS_TOKEN_SECRET: change-access-token-secret
      REFRESH_TOKEN_SECRET: change-refresh-token-secret
      OTP_HASH_SECRET: change-otp-hash-secret
      JWT_ALGORITHM: HS256
      BREVO_API_KEY: ""
      BREVO_SENDER_EMAIL: no-reply@fairgig.app
      BREVO_SENDER_NAME: FairGig
      ALLOWED_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    networks:
      - fairgig-net

  earnings-service:
    build:
      context: ./services/earningsService
      dockerfile: Dockerfile
    container_name: fairgig-earnings
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fairgig_earnings
      FRONTEND_URL: http://localhost:5173
      ACCESS_TOKEN_SECRET: change-access-token-secret
      INTERNAL_SERVICE_API_KEY: fairgig-internal-dev-key
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      MAX_SCREENSHOT_SIZE_BYTES: 5242880
      MAX_CSV_SIZE_BYTES: 2097152
    ports:
      - "3001:3001"
    networks:
      - fairgig-net

  anomaly-service:
    build:
      context: ./services/anamolyService
      dockerfile: Dockerfile
    container_name: fairgig-anomaly
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
    environment:
      PORT: 8002
      API_PREFIX: /api/anomaly
      SERVICE_NAME: anomaly-detection
      SERVICE_VERSION: 1.0.0
      ACCESS_TOKEN_SECRET: change-access-token-secret
      JWT_ALGORITHM: HS256
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-20}
      INTERNAL_SERVICE_API_KEY: fairgig-internal-dev-key
      ALLOW_OPEN_DETECT: "true"
      ALLOWED_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8002:8002"
    networks:
      - fairgig-net

  grievance-service:
    build:
      context: ./services/grievanceService
      dockerfile: Dockerfile
    container_name: fairgig-grievance
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/fairgig_grievance
      JWT_SECRET: change-access-token-secret
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "3002:3002"
    networks:
      - fairgig-net

  analytics-service:
    build:
      context: ./services/analyticsService
      dockerfile: Dockerfile
    container_name: fairgig-analytics
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      grievance-service:
        condition: service_started
    environment:
      PORT: 8003
      API_PREFIX: /api/analytics
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fairgig_analytics
      EARNINGS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fairgig_earnings
      JWT_SECRET: change-access-token-secret
      ACCESS_TOKEN_SECRET: change-access-token-secret
      JWT_ALGORITHM: HS256
      CACHE_TTL_SECONDS: 900
      PLATFORMS_CACHE_TTL_SECONDS: 1800
      GRIEVANCE_CACHE_TTL_SECONDS: 300
      MIN_COHORT_SIZE: 5
      WORKER_REF_SALT: fairgig-worker-ref-salt
      GRIEVANCE_SERVICE_URL: http://grievance-service:3002/api/grievances
      GRIEVANCE_TIMEOUT_SECONDS: 5
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8003:8003"
    networks:
      - fairgig-net

  certificate-service:
    build:
      context: ./services/certificateService
      dockerfile: Dockerfile
    container_name: fairgig-certificate
    restart: unless-stopped
    depends_on:
      earnings-service:
        condition: service_started
    environment:
      PORT: 8004
      API_PREFIX: /api/certificate
      JWT_SECRET: change-access-token-secret
      ACCESS_TOKEN_SECRET: change-access-token-secret
      JWT_ALGORITHM: HS256
      EARNINGS_SERVICE_URL: http://earnings-service:3001/api/earnings
      INTERNAL_SERVICE_API_KEY: fairgig-internal-dev-key
      REQUEST_TIMEOUT_SECONDS: 8
      TEMPLATE_DIR: app/templates
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8004:8004"
    networks:
      - fairgig-net

  api-gateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: fairgig-api-gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      earnings-service:
        condition: service_started
      anomaly-service:
        condition: service_started
      grievance-service:
        condition: service_started
      analytics-service:
        condition: service_started
      certificate-service:
        condition: service_started
    environment:
      GATEWAY_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8000
      AUTH_INTROSPECT_URL: http://auth-service:8000/api/auth/introspect
      EARNINGS_SERVICE_URL: http://earnings-service:3001
      ANALYTICS_SERVICE_URL: http://analytics-service:8003
      ANOMALY_SERVICE_URL: http://anomaly-service:8002
      GRIEVANCE_SERVICE_URL: http://grievance-service:3002
      CERTIFICATE_SERVICE_URL: http://certificate-service:8004
    ports:
      - "8080:8080"
    networks:
      - fairgig-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fairgig-frontend
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "5173:80"
    networks:
      - fairgig-net

networks:
  fairgig-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
