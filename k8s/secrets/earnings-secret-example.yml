apiVersion: v1
kind: Secret
metadata:
  name: earnings-secrets
  namespace: app
type: Opaque
stringData:
  PORT: 3001
  DATABASE_URL: postgresql://youruser:yourpassword@postgres:5432/fairgig_earnings
  FRONTEND_URL: http://localhost:5173
  ACCESS_TOKEN_SECRET: change-access-token-secret
  INTERNAL_SERVICE_API_KEY: fairgig-internal-dev-key
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: access-key-placeholder
  AWS_SECRET_ACCESS_KEY: secret-key-placeholder
  AWS_S3_BUCKET_NAME: fairgig-earnings-bucket
  S3_PUBLIC_BASE_URL: https://fairgig-earnings-bucket.s3.amazonaws.com
  MAX_SCREENSHOT_SIZE_BYTES: 5242880
  MAX_CSV_SIZE_BYTES: 2097152