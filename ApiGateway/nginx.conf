worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Container-to-container upstreams.
    upstream auth_service {
        server auth-service:8000;
    }

    upstream earnings_service {
        server earnings-service:3001;
    }

    upstream analytics_service {
        server analytics-service:8003;
    }

    upstream anomaly_service {
        server anomaly-service:8002;
    }

    upstream grievance_service {
        server grievance-service:3002;
    }

    upstream certificate_service {
        server certificate-service:8004;
    }

    server {
        listen 8080;
        server_name _;

        location = /health {
            return 200 "gateway-ok";
            add_header Content-Type text/plain;
        }

        # Auth subrequest endpoint used by protected routes.
        location = /_auth/validate {
            internal;
            proxy_pass http://auth_service/api/auth/introspect;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }

        # Public auth endpoints.
        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Protected services.
        location /api/earnings/ {
            auth_request /_auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_name $upstream_http_x_user_name;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Name $user_name;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://earnings_service;
        }

        location /api/analytics/ {
            auth_request /_auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_name $upstream_http_x_user_name;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Name $user_name;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://analytics_service;
        }

        location /api/anomaly/ {
            auth_request /_auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_name $upstream_http_x_user_name;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Name $user_name;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://anomaly_service;
        }

        location /api/grievances {
            auth_request /_auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_name $upstream_http_x_user_name;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Name $user_name;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://grievance_service;
        }

        location /api/certificate/ {
            auth_request /_auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_name $upstream_http_x_user_name;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Name $user_name;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://certificate_service;
        }
    }
}
